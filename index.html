<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داواکردنی تایبەتمەندی - SnapPrime</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1a, #05050a);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .bg-shape1, .bg-shape2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }
        .bg-shape1 {
            width: 300px;
            height: 300px;
            background: rgba(255, 235, 59, 0.15);
            top: -50px;
            right: -50px;
        }
        .bg-shape2 {
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.05);
            bottom: -50px;
            left: -50px;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            margin: 20px 0;
        }

        h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            font-size: 24px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.3), 0 0 20px rgba(255, 235, 59, 0.2);
        }
        h2 span {
            color: #ffeb3b;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #ffeb3b;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.15);
        }

        input::placeholder, textarea::placeholder {
            color: #666;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ffeb3b, #fbc02d);
            color: #111;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 235, 59, 0.3);
            margin-top: 10px;
        }

        button:hover {
            box-shadow: 0 6px 20px rgba(255, 235, 59, 0.5);
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

<div class="bg-shape1"></div>
<div class="bg-shape2"></div>

<div class="glass-container">
    <h2>Snapchat<span>Prime</span> Requests</h2>
    <form action="https://formspree.io/f/mreregpp" method="POST">
        
        <div class="input-group">
            <label>ناوی تۆ (ئارەزوومەندانە):</label>
            <input type="text" name="name" placeholder="دەتوانیت ناوت بنووسیت یان بەتاڵی جێبهێڵیت...">
        </div>
        
        <div class="input-group">
            <label>تایبەتمەندی داواکراو:</label>
            <textarea name="request" placeholder="چ تایبەتمەندییەکی نوێ بۆ بەرنامەکە زیاد بکەین؟..." rows="4" required></textarea>
        </div>
        
        <button type="submit">ناردنی داواکاری</button>
    </form>
</div>

</body>
</html>
